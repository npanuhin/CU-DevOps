name: CI — Test, Build, Release

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run unit tests
        run: python -m pytest app -v --cov=app --cov-report=term-missing

  integration-test:
    name: Integration tests
    needs: unit-test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: fruitapi
          MYSQL_USER: fruitapi
          MYSQL_PASSWORD: fruitapi
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest httpx

      - name: Build Docker image
        run: docker build -t fruits-api-test .

      - name: Start container
        run: |
          docker run -d --name fruits-api-test \
            --network host \
            -e DB_HOST=127.0.0.1 \
            -e DB_PORT=3306 \
            -e DB_USER=fruitapi \
            -e DB_PASSWORD=fruitapi \
            -e DB_NAME=fruitapi \
            fruits-api-test

      - name: Wait for app to be ready
        run: |
          for i in {1..60}; do
            curl -fs http://localhost:8000/health && break
            sleep 1
          done

      - name: Run integration tests
        env:
          BASE_URL: http://localhost:8000
        run: python -m pytest tests -v

      - name: Show app logs on failure
        if: failure()
        run: docker logs fruits-api-test || true

      - name: Stop container
        if: always()
        run: docker rm -f fruits-api-test

  release:
    name: Tag & push to GHCR
    needs: integration-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Extract version from main.py
        id: version
        run: |
          VERSION=$(python -c "import re; m=re.search(r'version=\"([^\"]+)\"', open('app/app.py').read()); print(m.group(1))")
          echo "semver=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.version=${{ steps.version.outputs.semver }}" \
            -t ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.semver }} \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push to GHCR
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.semver }}
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest
